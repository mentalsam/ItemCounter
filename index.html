<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理システム v2.1</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --secondary: #64748b; 
            --success: #10b981;
            --danger: #ef4444; 
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* タブ切り替え */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-weight: bold; color: var(--secondary); border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.25rem; display: flex; align-items: center; gap: 8px; }

        /* 入力フォーム */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }
        
        /* データベーステーブル */
        .db-table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; color: #475569; }
        .thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; background: #eee; }

        /* カウンター表示 */
        .result-display { background: #1e293b; color: #f8fafc; padding: 30px; border-radius: 16px; text-align: center; }
        .result-number { font-size: 4rem; font-weight: 800; color: #38bdf8; }

        .btn-add { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-delete { color: var(--danger); background: none; border: 1px solid var(--danger); width: auto; padding: 5px 10px; cursor: pointer; border-radius: 6px; }
        .btn-edit { color: var(--primary); background: none; border: 1px solid var(--primary); width: auto; padding: 5px 10px; cursor: pointer; border-radius: 6px; margin-right: 4px; }
        .edit-mode-banner { background: #fef9c3; border: 1px solid #fde047; border-radius: 8px; padding: 10px 15px; margin-bottom: 12px; font-size: 13px; color: #854d0e; display: flex; align-items: center; gap: 8px; }
        .btn-cancel { background: var(--secondary); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .hidden { display: none; }
        
        /* テーブルの行ホバー効果 */
        #dbList tr:hover {
            background-color: #f1f5f9;
        }

        /* --- 追加：検索クリアボタン用のスタイル --- */
        .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            width: auto; /* 全体設定の100%を上書き */
            display: none; /* 初期状態は非表示 */
        }
        .clear-btn.visible {
            display: block;
        }
        .clear-btn:hover {
            color: var(--danger);
        }

        /* --- 追加：サジェスト（オートコンプリート）用のスタイル --- */
        .search-container { position: relative; }
        .autocomplete-list {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .autocomplete-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            font-size: 15px;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background-color: #e2e8f0; }
        
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 商品データベース管理</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('calc')">⚖️ 計測</button>
        <button class="tab-btn" onclick="showTab('admin')">⚙️ マスター管理</button>
    </div>

    <div id="tab-calc">
        <div class="card">
            <h2>🔍 商品選択</h2>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 商品名を検索または選択..." 
                    oninput="updateDropdown(); toggleClearBtn();" 
                    onfocus="showDropdown()" 
                    autocomplete="off" 
                    style="border: 2px solid var(--primary); font-size: 16px; font-weight: bold; padding-right: 35px;">
                <button id="clearBtn" class="clear-btn" onclick="clearSearch()" aria-label="クリア">✖</button>
                <div id="autocompleteList" class="autocomplete-list hidden"></div>
            </div>
            
            <div id="productPreview" style="margin-top: 15px; text-align: center;" class="hidden">
                <img id="displayImage" style="max-height: 150px; border-radius: 8px;">
                <p id="weightInfo" style="font-weight: bold; color: var(--secondary);"></p>
            </div>

            <div style="margin-top: 20px;">
                <label>総重量 (kg)</label>
                <input 
                    type="number" 
                    id="totalKg" 
                    placeholder="0.00" 
                    step="0.01" 
                    inputmode="decimal" 
                    oninput="calculate()" 
                    autocomplete="one-time-code" 
                    autocorrect="off" 
                    autocapitalize="off" 
                    spellcheck="false" 
                    enterkeyhint="done" 
                >
            </div>
        </div>

        <div class="result-display">
            <div style="opacity: 0.7;">推定合計個数</div>
            <div id="result" class="result-number">0</div>
            <div>個</div>
        </div>
    </div>

    <div id="tab-admin" class="hidden">
        <div class="card">
            <h2>➕ 商品の新規登録 / 編集</h2>
            <div id="editModeBanner" class="edit-mode-banner hidden">
                ✏️ <strong id="editTargetName"></strong> を編集中です
            </div>
            <div class="form-grid">
                <input 
                    type="text" 
                    id="itemTitleInput" 
                    name="product_entry_field" 
                    placeholder="商品名を入力" 
                    autocomplete="one-time-code"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                >
                <input 
                    type="number" 
                    id="unitWeight" 
                    placeholder="1個の重さ (kg)" 
                    step="0.001" 
                    inputmode="decimal"
                    autocomplete="one-time-code"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    enterkeyhint="next"
                >
            </div>
            <div style="margin-top: 10px;">
                <label style="font-size: 12px;">商品画像</label>
                <input type="file" id="itemImage" accept="image/*">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-add" onclick="addProduct()" style="margin-top:15px; flex:1;" id="saveBtn">データベースへ保存</button>
                <button class="btn-cancel hidden" onclick="cancelEdit()" style="margin-top:15px; flex:0 0 auto; padding: 12px 20px; border-radius: 8px;" id="cancelBtn">キャンセル</button>
            </div>
        </div>

        <div class="card">
            <h2>📋 登録済み商品一覧 (<span id="dbCount">0</span>件)</h2>
            <div class="db-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>画像</th>
                            <th>商品名</th>
                            <th>単重(kg)</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="dbList">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyywtIxyC7MufDeTEvPtXmCie-0jiLCMAe4e_ZYE3e_D7-xqTPQVs4jtsNOkg8I4ng/exec";

let products = {};

let selectedProductName = ""; 

window.onload = async () => {

    try {

        const response = await fetch(GAS_URL);

        const data = await response.json();

        products = {};

        data.forEach(item => {

            products[item.name] = { weight: item.weight, image: item.image };

        });

        refreshUI();

    } catch (e) {

        console.error(e); // 本当のエラー原因がわかるようにコンソール出力も追加

        alert("データの取得または画面の更新に失敗しました");

    }

};

function showTab(tabName) {

    document.getElementById('tab-calc').classList.toggle('hidden', tabName !== 'calc');

    document.getElementById('tab-admin').classList.toggle('hidden', tabName !== 'admin');

    document.querySelectorAll('.tab-btn').forEach(btn => {

        btn.classList.toggle('active', btn.innerText.includes(tabName === 'calc' ? '計測' : 'マスター'));

    });

    refreshUI();

}

// --- サジェスト用追加機能 ---

function showDropdown() {

    document.getElementById('autocompleteList').classList.remove('hidden');

    updateDropdown();

}

function hideDropdown() {

    document.getElementById('autocompleteList').classList.add('hidden');

}

document.addEventListener('mousedown', function(e) {

    if (!e.target.closest('.search-container')) hideDropdown();

});

function selectProduct(name) {

    document.getElementById('searchInput').value = name;

    selectedProductName = name;

    toggleClearBtn();

    hideDropdown();

    updateDisplay();

}

function selectAndJump(name) {

    showTab('calc');

    selectProduct(name); 

    document.getElementById('totalKg').focus();

}

// ----------------------------

async function addProduct() {

    const name = document.getElementById('itemTitleInput').value.trim();

    const weight = document.getElementById('unitWeight').value;

    const fileInput = document.getElementById('itemImage');

    

    const pass = prompt("店番を入力してください");

    if (!pass) return;

    if (!name || !weight) return alert("商品名と重量は必須です");

    const doPost = async (imgData) => {

        const payload = {

            pass: pass,

            name: name,

            weight: parseFloat(weight),

            image: imgData

        };

        if (editingOriginalName && editingOriginalName !== name) {

            payload.oldName = editingOriginalName;

            payload.action = "update";

        } else if (editingOriginalName) {

            payload.action = "update";

        }

        try {

            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });

            const result = await res.json();

            if(result.status === "error") return alert("パスワードが違います");

            alert(editingOriginalName ? "更新しました！" : "クラウドに保存しました！");

            location.reload();

        } catch (err) { alert("通信エラーが発生しました"); }

    };

    if (fileInput.files && fileInput.files[0]) {

        const file = fileInput.files[0];

        const reader = new FileReader();

        reader.onload = (e) => {

            const img = new Image();

            img.onload = () => {

                const canvas = document.createElement('canvas');

                const ctx = canvas.getContext('2d');

                const MAX_WIDTH = 200;

                let width = img.width;

                let height = img.height;

                if (width > MAX_WIDTH) {

                    height *= MAX_WIDTH / width;

                    width = MAX_WIDTH;

                }

                canvas.width = width;

                canvas.height = height;

                ctx.drawImage(img, 0, 0, width, height);

                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

                doPost(compressedBase64);

            };

            img.src = e.target.result;

        };

        reader.readAsDataURL(file);

    } else {

        const existingImage = editingOriginalName ? (products[editingOriginalName]?.image || null) : (products[name]?.image || null);

        doPost(existingImage);

    }

}

async function deleteProduct(name) {

    const pass = prompt(`「${name}」を削除します。パスワードを入力してください`);

    if (!pass) return;

    try {

        const payload = { pass: pass, action: "delete", name: name };

        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });

        const result = await res.json();

        if(result.status === "success") {

            alert("削除しました");

            delete products[name];

            refreshUI();

        } else {

            alert("削除に失敗しました（パスワード違いなど）");

        }

    } catch (err) {

        alert("通信エラーが発生しました");

    }

}

let editingOriginalName = null;

function editProduct(name) {

    const item = products[name];

    if (!item) return;

    editingOriginalName = name;

    document.getElementById('itemTitleInput').value = name;

    document.getElementById('unitWeight').value = item.weight;

    document.getElementById('itemImage').value = '';

    document.getElementById('editModeBanner').classList.remove('hidden');

    document.getElementById('editTargetName').textContent = name;

    document.getElementById('cancelBtn').classList.remove('hidden');

    document.getElementById('saveBtn').textContent = '変更を保存';

    document.getElementById('itemTitleInput').scrollIntoView({ behavior: 'smooth', block: 'center' });

    document.getElementById('itemTitleInput').focus();

}

function cancelEdit() {

    editingOriginalName = null;

    clearForm();

}

function clearForm() {

    editingOriginalName = null;

    document.getElementById('itemTitleInput').value = '';

    document.getElementById('unitWeight').value = '';

    document.getElementById('itemImage').value = '';

    document.getElementById('editModeBanner').classList.add('hidden');

    document.getElementById('cancelBtn').classList.add('hidden');

    document.getElementById('saveBtn').textContent = 'データベースへ保存';

}

function refreshUI() {

    updateDropdown();

    updateTable();

    document.getElementById('dbCount').textContent = Object.keys(products).length;

    toggleClearBtn();
}

function normalizeText(str) {

    if (!str) return "";

    return str

        .toLowerCase()

        .replace(/[\u30a1-\u30f6]/g, function(match) {

            return String.fromCharCode(match.charCodeAt(0) - 0x60);

        })

        .replace(/[！-～]/g, function(match) {

            return String.fromCharCode(match.charCodeAt(0) - 0xfee0);

        })

        .replace(/　/g, " ");

}

// --- 検索クリア用機能 ---
function toggleClearBtn() {
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    if (!searchInput || !clearBtn) return;
    if (searchInput.value.length > 0) {
        clearBtn.classList.add('visible');
    } else {
        clearBtn.classList.remove('visible');
    }
}
function clearSearch() {
    const searchInput = document.getElementById('searchInput');
    if (!searchInput) return;
    searchInput.value = '';
    toggleClearBtn();
    updateDropdown();
    updateDisplay();
    searchInput.focus();
}

// --- 書き換え対象の関数たち ---

function updateDropdown() {

    const list = document.getElementById('autocompleteList');

    const searchInput = document.getElementById('searchInput');

    

    // もしHTML側にこれらがない状態（タブ移動直後など）なら処理をスキップ

    if(!list || !searchInput) return;

    const term = normalizeText(searchInput.value);

    list.innerHTML = '';

    let matchCount = 0;

    const sortedKeys = Object.keys(products).sort((a, b) => a.localeCompare(b, 'ja'));

    sortedKeys.forEach(name => {

        const normalizedName = normalizeText(name);

        if (!term || normalizedName.includes(term)) {

            const itemDiv = document.createElement('div');

            itemDiv.className = 'autocomplete-item';

            itemDiv.textContent = name;

            itemDiv.onmousedown = (e) => {

                e.preventDefault(); 

                selectProduct(name);

            };

            list.appendChild(itemDiv);

            matchCount++;

        }

    });

    if (matchCount === 0) {

        list.innerHTML = '<div style="padding: 12px 15px; color: #64748b;">該当する商品がありません</div>';

    }

    updateDisplay();

    toggleClearBtn();
}

function updateTable() {

    const tbody = document.getElementById('dbList');

    if(!tbody) return;

    tbody.innerHTML = '';

    

    const sortedKeys = Object.keys(products).sort((a, b) => a.localeCompare(b, 'ja'));

    sortedKeys.forEach(name => {

        const item = products[name];

        const tr = document.createElement('tr');

        tr.style.cursor = "pointer";

        tr.onclick = (e) => {

            if (e.target.tagName !== 'BUTTON') {

                selectAndJump(name);

            }

        };

        

        tr.innerHTML = `

            <td><img src="${item.image || 'https://via.placeholder.com/40'}" class="thumb"></td>

            <td><strong>${name}</strong></td>

            <td>${parseFloat(item.weight).toFixed(3)}</td>

            <td>

                <button class="btn-edit" onclick="editProduct('${name}')">編集</button>

                <button class="btn-delete" onclick="deleteProduct('${name}')">削除</button>

            </td>

        `;

        tbody.appendChild(tr);

    });

}

function updateDisplay() {

    const searchInput = document.getElementById('searchInput');

    if(!searchInput) return;

    const name = searchInput.value;

    const preview = document.getElementById('productPreview');

    const img = document.getElementById('displayImage');

    const info = document.getElementById('weightInfo');

    

    if (name && products[name]) {

        const item = products[name];

        preview.classList.remove('hidden');

        info.textContent = `1個あたり: ${item.weight} kg`;

        img.src = item.image || '';

        img.style.display = item.image ? 'inline' : 'none';

    } else {

        preview.classList.add('hidden');

    }

    calculate();

}

function calculate() {

    const searchInput = document.getElementById('searchInput');

    const totalInput = document.getElementById('totalKg');

    const resultDiv = document.getElementById('result');

    

    if(!searchInput || !totalInput || !resultDiv) return;

    const name = searchInput.value;

    const total = totalInput.value;

    

    if (name && total && products[name]) {

        const qty = Math.round(parseFloat(total) / products[name].weight);

        resultDiv.textContent = qty >= 0 ? qty.toLocaleString() : 0;

    } else {

        resultDiv.textContent = 0;

    }

}
</script>

</body>
</html>
