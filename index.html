<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理システム v2.0</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --secondary: #64748b; 
            --success: #10b981;
            --danger: #ef4444; 
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* タブ切り替え */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-weight: bold; color: var(--secondary); border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.25rem; display: flex; align-items: center; gap: 8px; }

        /* 入力フォーム */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }
        
        /* データベーステーブル */
        .db-table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; color: #475569; }
        .thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; background: #eee; }

        /* カウンター表示 */
        .result-display { background: #1e293b; color: #f8fafc; padding: 30px; border-radius: 16px; text-align: center; }
        .result-number { font-size: 4rem; font-weight: 800; color: #38bdf8; }

        .btn-add { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-delete { color: var(--danger); background: none; border: 1px solid var(--danger); width: auto; padding: 5px 10px; cursor: pointer; }
        .hidden { display: none; }
        
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 商品データベース管理</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('calc')">⚖️ 計測</button>
        <button class="tab-btn" onclick="showTab('admin')">⚙️ マスター管理</button>
    </div>

    <div id="tab-calc">
        <div class="card">
            <h2>🔍 商品選択</h2>
            <input type="text" id="searchInput" placeholder="商品名を検索..." oninput="filterProducts()">
            <select id="productSelect" onchange="updateDisplay()" style="margin-top:10px; border: 2px solid var(--primary);"></select>
            
            <div id="productPreview" style="margin-top: 15px; text-align: center;" class="hidden">
                <img id="displayImage" style="max-height: 150px; border-radius: 8px;">
                <p id="weightInfo" style="font-weight: bold; color: var(--secondary);"></p>
            </div>

            <div style="margin-top: 20px;">
                <label>総重量 (kg)</label>
                <input 
                    type="number" 
                    id="totalKg" 
                    placeholder="0.00" 
                    step="0.01" 
                    inputmode="decimal" 
                    oninput="calculate()" 
                    autocomplete="one-time-code" 
                    autocorrect="off" 
                    autocapitalize="off" 
                    spellcheck="false" 
                    enterkeyhint="done" 
                >
            </div>
        </div>

        <div class="result-display">
            <div style="opacity: 0.7;">推定合計個数</div>
            <div id="result" class="result-number">0</div>
            <div>個</div>
        </div>
    </div>

    <div id="tab-admin" class="hidden">
        <div class="card">
            <h2>➕ 商品の新規登録 / 編集</h2>
            <div class="form-grid">
                <input 
                    type="text" 
                    id="itemTitleInput" 
                    name="product_entry_field" 
                    placeholder="商品名を入力" 
                    autocomplete="one-time-code"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                >
                <input 
                    type="number" 
                    id="unitWeight" 
                    placeholder="1個の重さ (kg)" 
                    step="0.001" 
                    inputmode="decimal"
                    autocomplete="one-time-code"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    enterkeyhint="next"
                >
            </div>
            <div style="margin-top: 10px;">
                <label style="font-size: 12px;">商品画像</label>
                <input type="file" id="itemImage" accept="image/*">
            </div>
            <button class="btn-add" onclick="addProduct()" style="margin-top:15px;">データベースへ保存</button>
        </div>

        <div class="card">
            <h2>📋 登録済み商品一覧 (<span id="dbCount">0</span>件)</h2>
            <div class="db-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>画像</th>
                            <th>商品名</th>
                            <th>単重(kg)</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="dbList">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwGDaPQ3Sr8Q2nJo0kh6gFQVfaPxpFicLM4IHG-V-QhN4mhm7CqaQY2LYBUeBWYg0A/exec";
    let products = {};

    // GASよりデータ取得
    window.onload = async () => {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            products = {};
            // item: {name, weight, image}
            data.forEach(item => {
                products[item.name] = { weight: item.weight, image: item.image };
            });
            refreshUI();
        } catch (e) {
            alert("データの取得に失敗しました");
        }
    };

    function showTab(tabName) {
        document.getElementById('tab-calc').classList.toggle('hidden', tabName !== 'calc');
        document.getElementById('tab-admin').classList.toggle('hidden', tabName !== 'admin');
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(tabName === 'calc' ? '計測' : 'マスター'));
        });
        refreshUI();
    }

    // --- 修正版：商品登録 ---
    async function addProduct() {
        // ここだけ変更: 新しい商品名入力欄に対応
        const name = document.getElementById('itemTitleInput').value.trim();
        const weight = document.getElementById('unitWeight').value;
        const fileInput = document.getElementById('itemImage');
        
        // 追記：パスワード入力を求める
        const pass = prompt("店番を入力してください");
        if (!pass) return;
        if (!name || !weight) return alert("商品名と重量は必須です");

        const doPost = async (imgData) => {
            const payload = {
                pass: pass, // パスワードを同封
                name: name,
                weight: parseFloat(weight),
                image: imgData
            };
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.status === "error") return alert("パスワードが違います");
                alert("クラウドに保存しました！");
                location.reload();
            } catch (err) { alert("通信エラーが発生しました"); }
        };

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => doPost(e.target.result);
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            doPost(products[name]?.image || null);
        }
    }

    // --- 修正版：パスワード付きの削除処理（即時画面からも消える） ---
    async function deleteProduct(name) {
        const pass = prompt(`「${name}」を削除します。パスワードを入力してください`);
        if (!pass) return;
        try {
            const payload = { pass: pass, action: "delete", name: name };
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.status === "success") {
                alert("削除しました");
                // 画面上のデータ(products変数)からも削除
                delete products[name];
                // 再描画して「(2件)」などの表示も更新
                refreshUI();
            } else {
                alert("削除に失敗しました（パスワード違いなど）");
            }
        } catch (err) {
            alert("通信エラーが発生しました");
        }
    }

    function clearForm() {
        document.getElementById('itemTitleInput').value = '';
        document.getElementById('unitWeight').value = '';
        document.getElementById('itemImage').value = '';
    }

    function refreshUI() {
        updateDropdown();
        updateTable();
        document.getElementById('dbCount').textContent = Object.keys(products).length;
    }

    function updateDropdown() {
        const select = document.getElementById('productSelect');
        const term = document.getElementById('searchInput').value.toLowerCase();
        const currentVal = select.value;
        select.innerHTML = '<option value="">-- 商品を選択してください --</option>';
        Object.keys(products).sort().forEach(name => {
            if (name.toLowerCase().includes(term)) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            }
        });
        select.value = products[currentVal] ? currentVal : "";
    }

    function updateTable() {
        const tbody = document.getElementById('dbList');
        tbody.innerHTML = '';
        Object.keys(products).sort().forEach(name => {
            const item = products[name];
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><img src="${item.image || 'https://via.placeholder.com/40'}" class="thumb"></td>
                <td><strong>${name}</strong></td>
                <td>${parseFloat(item.weight).toFixed(3)}</td>
                <td>
                    <button class="btn-delete" onclick="deleteProduct('${name}')">削除</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateDisplay() {
        const name = document.getElementById('productSelect').value;
        const preview = document.getElementById('productPreview');
        const img = document.getElementById('displayImage');
        const info = document.getElementById('weightInfo');
        if (name && products[name]) {
            const item = products[name];
            preview.classList.remove('hidden');
            info.textContent = `1個あたり: ${item.weight} kg`;
            img.src = item.image || '';
            img.style.display = item.image ? 'inline' : 'none';
        } else {
            preview.classList.add('hidden');
        }
        calculate();
    }

    function filterProducts() {
        updateDropdown();
    }

    function calculate() {
        const name = document.getElementById('productSelect').value;
        const total = document.getElementById('totalKg').value;
        const resultDiv = document.getElementById('result');
        if (name && total && products[name]) {
            const qty = Math.round(parseFloat(total) / products[name].weight);
            resultDiv.textContent = qty >= 0 ? qty.toLocaleString() : 0;
        } else {
            resultDiv.textContent = 0;
        }
    }
</script>

</body>
</html>
